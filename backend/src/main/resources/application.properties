# This is the logical name of your Spring Boot application.
spring.application.name=placementtracker

# This tells Spring to also read key-value pairs from backend/.env file.
# The [ .properties ] hint lets Spring parse extensionless files like .env.
spring.config.import=optional:file:.env[.properties]

# This is your Neon PostgreSQL JDBC URL. Replace host, database, username, and password.
# sslmode=require ensures a secure SSL connection to Neon cloud.
spring.datasource.url=${DB_URL}

# Database username for your Neon PostgreSQL instance.
spring.datasource.username=${DB_USERNAME}

# Database password for your Neon PostgreSQL instance.
spring.datasource.password=${DB_PASSWORD}

# This tells Hibernate to validate schema against entities (safe for production-like workflow).
spring.jpa.hibernate.ddl-auto=validate

# This prints SQL queries in the console, useful while learning and debugging.
spring.jpa.show-sql=true

# This explicitly sets PostgreSQL dialect so Hibernate generates PostgreSQL-compatible SQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enables Flyway so schema changes are handled through versioned SQL migrations.
spring.flyway.enabled=true

# JWT secret key placeholder; replace with a strong random secret before real use.
jwt.secret=${JWT_SECRET}

# JWT expiration in milliseconds (example: 86400000 = 24 hours).
jwt.expiration=${JWT_EXPIRATION}

# Swagger UI endpoint path for API documentation in browser.
springdoc.swagger-ui.path=/swagger-ui.html

spring.flyway.out-of-order=true
spring.flyway.ignore-missing-migrations=true